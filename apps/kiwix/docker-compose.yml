services:

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: kiwix
    restart: unless-stopped

    expose:
      - 8080
    
    networks:
      - infra_net
    
    volumes:
      - /app/data/kiwix/zim:/data
    
    command: "*.zim"


networks:
  infra_net:
    external: true
    name: infra_net